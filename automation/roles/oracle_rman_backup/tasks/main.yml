---
- name: "Pre-Check — Database OPEN e ARCHIVELOG"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET HEAD OFF FEED OFF
    SELECT status || '|' || log_mode FROM v\$instance i, v\$database d;
    EXIT;
    EOF_SQL
  register: db_mode
  changed_when: false

- name: "Assert — DB OPEN e ARCHIVELOG"
  assert:
    that:
      - "'OPEN' in db_mode.stdout"
      - "'ARCHIVELOG' in db_mode.stdout"
    fail_msg: "Il database deve essere OPEN e in ARCHIVELOG mode!"

- name: "Pre-Check — Spazio FRA"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET HEAD OFF FEED OFF
    SELECT ROUND(space_used * 100 / space_limit) FROM v\$recovery_file_dest;
    EXIT;
    EOF_SQL
  register: fra_usage
  changed_when: false

- name: "Assert — FRA non piena (< {{ fra_alert_pct }}%)"
  assert:
    that: fra_usage.stdout | trim | int < fra_alert_pct | int
    fail_msg: "FRA al {{ fra_usage.stdout | trim }}%! Esegui il runbook FRA/Data Guard prima del backup."

- name: "RMAN — Crosscheck metadata senza cancellazioni"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    rman target / <<EOF_RMAN
    CROSSCHECK BACKUP;
    CROSSCHECK ARCHIVELOG ALL;
    EXIT;
    EOF_RMAN
  register: crosscheck
  changed_when: false

- name: "RMAN — Backup Database + Archivelog"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    rman target / <<EOF_RMAN
    RUN {
      ALLOCATE CHANNEL c1 DEVICE TYPE DISK;
      {% for i in range(2, rman_parallel_channels | int + 1) %}
      ALLOCATE CHANNEL c{{ i }} DEVICE TYPE DISK;
      {% endfor %}
      BACKUP
        AS COMPRESSED BACKUPSET
        SECTION SIZE 32G
        DATABASE
        INCLUDE CURRENT CONTROLFILE
        PLUS ARCHIVELOG;
      BACKUP CURRENT CONTROLFILE;
      BACKUP SPFILE;
    }
    EXIT;
    EOF_RMAN
  register: backup_result

- name: "Verifica Backup — No RMAN errors"
  assert:
    that:
      - "'RMAN-00569' not in backup_result.stdout"
      - "'ORA-' not in backup_result.stdout"
    fail_msg: "⚠️ RMAN Backup ha riscontrato errori!"
    success_msg: "✅ Backup RMAN completato senza errori"

- name: "RMAN — Validate ultimo backup"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    rman target / <<EOF_RMAN
    RESTORE DATABASE VALIDATE;
    RESTORE ARCHIVELOG ALL VALIDATE;
    EXIT;
    EOF_RMAN
  register: validate_result

- name: "Verifica Validate"
  debug:
    msg: |
      {% if 'media recovery not required' in validate_result.stdout | lower or 'Finished restore' in validate_result.stdout %}
      ✅ VALIDATE OK — Il backup è utilizzabile per il restore
      {% else %}
      ⚠️ VALIDATE ha prodotto output da verificare:
      {{ validate_result.stdout_lines[-10:] | join('\n') }}
      {% endif %}

- name: "RMAN — Report backup finale"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    rman target / <<EOF_RMAN
    SHOW ARCHIVELOG DELETION POLICY;
    LIST BACKUP SUMMARY;
    LIST EXPIRED BACKUP;
    LIST EXPIRED ARCHIVELOG ALL;
    REPORT NEED BACKUP;
    REPORT OBSOLETE;
    EXIT;
    EOF_RMAN
  register: rman_report
  changed_when: false

- name: "📋 RMAN BACKUP REPORT"
  debug:
    msg: |
      ============================================================
       RMAN BACKUP REPORT — {{ ansible_date_time.date }}
       Host: {{ inventory_hostname }}
       Database: {{ oracle_db_name }}
      ============================================================
      {{ rman_report.stdout }}
      ============================================================
      Il ruolo non cancella file. Per liberare spazio applica il runbook
      FRA/Data Guard, verifica lag e gap sullo standby e registra il cleanup.
