---
- name: "CHECK 1 — Stato CRS"
  shell: |
    export ORACLE_HOME={{ grid_home }}
    {{ grid_home }}/bin/crsctl check crs 2>&1
  register: crs_status
  changed_when: false
  ignore_errors: yes

- name: "CHECK 1 — Stato Database Instances"
  shell: |
    export ORACLE_HOME={{ grid_home }}
    {{ grid_home }}/bin/srvctl status database -d {{ oracle_db_name }} -v
  register: db_status
  changed_when: false

- name: "CHECK 1 — Stato Listener"
  shell: |
    export ORACLE_HOME={{ grid_home }}
    {{ grid_home }}/bin/srvctl status listener
    {{ grid_home }}/bin/srvctl status scan_listener
  register: listener_status
  changed_when: false

- name: "CHECK 2 — Alert Log (errori ultime 24h)"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET HEAD OFF FEED OFF LINES 200 PAGES 0 TRIMSPOOL ON
    SELECT TO_CHAR(originating_timestamp, 'DD-MON HH24:MI') || ' | ' || SUBSTR(message_text, 1, 150)
    FROM v\$diag_alert_ext
    WHERE originating_timestamp > SYSDATE - 1
      AND (message_text LIKE '%ORA-%' OR message_text LIKE '%WARNING%' OR message_text LIKE '%ERROR%')
    ORDER BY originating_timestamp DESC
    FETCH FIRST 20 ROWS ONLY;
    EXIT;
    EOF_SQL
  register: alert_log
  changed_when: false

- name: "CHECK 3 — Tablespace (% uso)"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET LINES 200 PAGES 100 HEAD ON
    COL tablespace_name FOR A30
    SELECT tablespace_name,
           ROUND(used_space * 8192 / 1024 / 1024 / 1024, 1) AS used_gb,
           ROUND(tablespace_size * 8192 / 1024 / 1024 / 1024, 1) AS total_gb,
           ROUND(used_percent, 1) AS pct_used
    FROM dba_tablespace_usage_metrics
    WHERE used_percent > {{ tablespace_alert_pct }}
    ORDER BY used_percent DESC;
    EXIT;
    EOF_SQL
  register: tablespace_check
  changed_when: false

- name: "CHECK 4 — ASM Diskgroup"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET LINES 200 PAGES 50 HEAD ON
    COL name FOR A15
    SELECT name, type, total_mb, free_mb,
           ROUND((1 - free_mb/total_mb)*100, 1) AS pct_used
    FROM v\$asm_diskgroup
    ORDER BY pct_used DESC;
    EXIT;
    EOF_SQL
  register: asm_check
  changed_when: false

- name: "CHECK 5 — Ultimo backup RMAN"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET LINES 200 PAGES 20 HEAD ON
    COL input_type FOR A20
    COL status FOR A12
    SELECT input_type, status,
           TO_CHAR(start_time, 'DD-MON HH24:MI') AS start_time,
           TO_CHAR(end_time, 'DD-MON HH24:MI') AS end_time
    FROM v\$rman_backup_job_details
    WHERE start_time > SYSDATE - 2
    ORDER BY start_time DESC;
    EXIT;
    EOF_SQL
  register: rman_check
  changed_when: false

- name: "CHECK 6 — Data Guard Lag"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET LINES 200 HEAD ON
    SELECT name, value, time_computed FROM v\$dataguard_stats
    WHERE name LIKE '%lag%';
    EXIT;
    EOF_SQL
  register: dg_check
  changed_when: false
  ignore_errors: yes

- name: "CHECK 7 — Sessioni attive e bloccanti"
  shell: |
    export ORACLE_HOME={{ oracle_home }}
    export ORACLE_SID={{ oracle_sid }}
    export PATH={{ oracle_home }}/bin:$PATH
    sqlplus -s / as sysdba <<EOF_SQL
    SET LINES 200 HEAD OFF
    SELECT 'Active sessions: ' || COUNT(*) FROM v\$session WHERE status = 'ACTIVE' AND type = 'USER';
    SELECT 'Blocking sessions: ' || COUNT(*) FROM v\$session WHERE blocking_session IS NOT NULL;
    EXIT;
    EOF_SQL
  register: session_check
  changed_when: false

- name: "📋 DAILY HEALTH CHECK REPORT"
  debug:
    msg: |
      ============================================================
       ORACLE DBA — DAILY HEALTH CHECK
       Host: {{ inventory_hostname }} | {{ ansible_date_time.date }}
      ============================================================

      ── 1. CRS & INSTANCES ──
      {{ db_status.stdout | default('N/A') }}

      ── 2. ALERT LOG (ORA-) ──
      {{ alert_log.stdout | default('Nessun errore') }}

      ── 3. TABLESPACE > {{ tablespace_alert_pct }}% ──
      {{ tablespace_check.stdout | default('OK — Nessun tablespace criticol') }}

      ── 4. ASM DISKGROUP ──
      {{ asm_check.stdout | default('N/A') }}

      ── 5. RMAN BACKUP ──
      {{ rman_check.stdout | default('⚠️ Nessun backup nelle ultime 48h!') }}

      ── 6. DATA GUARD ──
      {{ dg_check.stdout | default('N/A (no standby)') }}

      ── 7. SESSIONI ──
      {{ session_check.stdout | default('N/A') }}
      ============================================================
