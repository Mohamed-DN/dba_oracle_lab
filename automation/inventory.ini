# Ansible Inventory per Oracle AutoUpgrade
# Modifica gli hostname/IP in base al tuo ambiente.

[oracle_servers]
rac1    ansible_host=192.168.56.101
rac2    ansible_host=192.168.56.102

[standby_servers]
racstby1 ansible_host=192.168.56.111
racstby2 ansible_host=192.168.56.112

[all:vars]
ansible_user=oracle
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=yes
ansible_become_user=oracle

# ---- Variabili Oracle ----
oracle_source_home=/u01/app/oracle/product/19c/dbhome_1
oracle_target_home=/u01/app/oracle/product/26c/dbhome_1
oracle_sid=RACDB
oracle_db_name=RACDB
autoupgrade_config=/home/oracle/autoupgrade/config.cfg
autoupgrade_log_dir=/home/oracle/autoupgrade/logs
target_version=26
