---
# Variabili globali condivise fra tutti i playbook

# ---- Oracle Homes ----
oracle_base: /u01/app/oracle
oracle_home_19c: "{{ oracle_base }}/product/19c/dbhome_1"
oracle_home_26c: "{{ oracle_base }}/product/26c/dbhome_1"
grid_home: /u01/app/19c/grid

# ---- Oracle attivo (impostare in base all'operazione) ----
oracle_home: "{{ oracle_home_19c }}"
oracle_pdb_name: PDB1

# ---- ASM ----
asm_diskgroup_data: +DATA
asm_diskgroup_reco: +RECO

# ---- RMAN ----
rman_backup_dest: "{{ asm_diskgroup_reco }}"
rman_retention_days: 7
rman_parallel_channels: 4
rman_compression: "YES"

# ---- Patching ----
patch_stage_dir: /u01/stage/patches
opatch_version_min: "12.2.0.1.48"

# ---- AutoUpgrade ----
autoupgrade_jar: "{{ oracle_home }}/rdbms/admin/autoupgrade.jar"
autoupgrade_config_dir: /home/oracle/autoupgrade
autoupgrade_log_dir: /home/oracle/autoupgrade/logs

# ---- Data Guard ----
oracle_standby_db_name: RACDB_STBY
switchover_require_confirmation: true

# ---- Health Check ----
tablespace_alert_pct: 85
archivelog_alert_pct: 80
fra_alert_pct: 80

# ---- Security / Vault placeholders ----
# Definire in group_vars/vault.yml (Ansible Vault):
# vault_app_user_password: "StrongPasswordHere"
# vault_cdb_admin_password: "StrongCdbPasswordHere"
app_user_password: "{{ vault_app_user_password | default('VAULT_REQUIRED') }}"

# ---- Notifiche (opzionale, decommentare) ----
# notification_email: dba-team@company.com
# smtp_server: smtp.company.com

# ---- Checkmk (naming EDC + Oracle checks) ----
checkmk_environment: "{{ lab_environment | default('lab') }}"
checkmk_site_id: "edc_{{ checkmk_environment }}"
checkmk_folder_path: "/EDC/{{ checkmk_environment | upper }}/ORACLE"
checkmk_host_prefix: "edc-{{ checkmk_environment }}"
checkmk_server_fqdn: "checkmk.{{ checkmk_environment }}.example.local"
checkmk_server_ip: "192.168.56.10"
checkmk_server_alias: "checkmk"
checkmk_automation_user: "automation"
checkmk_automation_secret: "{{ vault_checkmk_automation_secret | default('VAULT_REQUIRED') }}"
checkmk_register_tls: false
checkmk_register_update: false
checkmk_force_initial_update_check: true

checkmk_oracle_monitor_user: "C##MONITOR"
checkmk_oracle_monitor_password: "{{ vault_checkmk_oracle_monitor_password | default('VAULT_REQUIRED') }}"
checkmk_oracle_db_name: "{{ oracle_db_name | default('RACDB') }}"
checkmk_oracle_host: "localhost"
checkmk_oracle_port: 1521
checkmk_oracle_sections: >-
  instance sessions logswitches undostat recovery_area processes
  tablespaces rman dataguard_stats performance
