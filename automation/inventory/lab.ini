# Lab Environment Inventory
# Modifica gli IP in base al tuo lab VirtualBox

[oracle_primary]
rac1    ansible_host=192.168.56.101
rac2    ansible_host=192.168.56.102

[oracle_standby]
racstby1 ansible_host=192.168.56.111
racstby2 ansible_host=192.168.56.112

[oracle_primary:vars]
oracle_sid=RACDB1
oracle_db_name=RACDB

[oracle_standby:vars]
oracle_sid=RACDB_STBY1
oracle_db_name=RACDB_STBY

[all:vars]
ansible_user=oracle
ansible_ssh_private_key_file=~/.ssh/id_rsa
