# Production Environment Inventory
# ⚠️ SOSTITUISCI con gli IP/hostname reali dei tuoi server di produzione

[oracle_primary]
# prod-rac1  ansible_host=10.x.x.x
# prod-rac2  ansible_host=10.x.x.x
# Impostare: oracle_db_name=RACDB oracle_db_unique_name=RACDB oracle_database_role=PRIMARY

[oracle_standby]
# prod-stby1 ansible_host=10.x.x.x
# prod-stby2 ansible_host=10.x.x.x
# Impostare: oracle_db_name=RACDB oracle_db_unique_name=RACDB_STBY oracle_database_role="PHYSICAL STANDBY"

[all:vars]
ansible_user=oracle
ansible_ssh_private_key_file=~/.ssh/id_rsa_prod
