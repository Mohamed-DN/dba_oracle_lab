---
# Backup RMAN indipendenti su primo nodo primary e primo nodo standby.
# Il ruolo non cancella file: usare rman_cleanup.yml dopo i gate.

- name: Oracle RMAN - Backup indipendente primary e standby
  hosts: oracle_primary[0]:oracle_standby[0]
  serial: 1
  become: true
  become_user: oracle
  gather_facts: true
  tasks:
    - name: Apply RMAN backup role
      ansible.builtin.include_role:
        name: oracle_rman_backup
      tags: [backup, rman]
