---
# ============================================================================
# Playbook: RMAN Backup con Validazione
# Esegue backup completo + crosscheck + validate + report
# Uso: ansible-playbook -i inventory/production.ini playbooks/rman_backup.yml
# ============================================================================

- name: "Oracle RMAN — Backup Completo + Validate"
  hosts: oracle_primary[0]
  become: yes
  become_user: oracle
  gather_facts: yes
  tasks:
    - name: Apply RMAN backup role
      ansible.builtin.include_role:
        name: oracle_rman_backup
      tags: [backup, rman]
