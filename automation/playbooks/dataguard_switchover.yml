---
- name: Oracle Data Guard Switchover Automation
  hosts: oracle_primary[0]
  become: true
  become_user: oracle
  gather_facts: false
  vars:
    standby_db: "{{ oracle_standby_db_name }}"
  tasks:
    - name: Apply Data Guard switchover role
      ansible.builtin.include_role:
        name: oracle_dataguard_switchover
      tags: [dataguard, switchover]
