---
- name: Manage RAC Database Services
  hosts: grid_infrastructure
  become: yes
  become_user: oracle
  gather_facts: no
  vars:
    oracle_home: "/u01/app/oracle/product/19.0.0/dbhome_1"
    db_name: "RACDB"
    service_name: "APP_SVC"
    desired_state: "start" # Can be start, stop, status

  tasks:
    - name: Execute SRVCTL command
      shell: |
        source ~/.bash_profile
        srvctl {{ desired_state }} service -d {{ db_name }} -s {{ service_name }}
      register: srvctl_out
      ignore_errors: yes

    - name: Verify Service Status
      shell: |
        source ~/.bash_profile
        srvctl status service -d {{ db_name }} -s {{ service_name }}
      register: service_status

    - name: Display Service Status
      debug:
        msg: "{{ service_status.stdout }}"
