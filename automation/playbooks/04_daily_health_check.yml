---
# ============================================================================
# Playbook: Daily Health Check
# Equivalente Ansible della procedura operativa 01_MORNING_HEALTH_CHECK.md
# Produce un report strutturato via STDOUT.
# Uso: ansible-playbook -i inventory/production.ini playbooks/04_daily_health_check.yml
# Schedulare con cron ogni mattina alle 07:00.
# ============================================================================

- name: "Oracle RAC — Daily Health Check"
  hosts: oracle_primary
  become: yes
  become_user: oracle
  gather_facts: yes
  roles:
    - role: oracle_daily_health
      tags: [health, daily]
