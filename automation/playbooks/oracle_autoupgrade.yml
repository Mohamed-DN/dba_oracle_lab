---
# ============================================================================
# Playbook: Oracle AutoUpgrade — 3 Fasi (CruGlobal Pattern)
# Ispirato a: CruGlobal/ansible-oracle-db-upgrade (flusso 3-stage reale)
#
# Flusso:
#   FASE 1 (pre_upgrade) — Esegui 24h PRIMA. NO downtime.
#   FASE 2 (upgrade)     — Upgrade reale. DOWNTIME RICHIESTO.
#   FASE 3 (finalize)    — Esegui 7 giorni DOPO. NO downtime.
#
# Uso:
#   ansible-playbook playbooks/03_oracle_autoupgrade.yml --tags pre_upgrade
#   ansible-playbook playbooks/03_oracle_autoupgrade.yml --tags upgrade
#   ansible-playbook playbooks/03_oracle_autoupgrade.yml --tags finalize
# ============================================================================

- name: "Oracle AutoUpgrade — 3 Fasi Production-Grade"
  hosts: oracle_primary
  become: yes
  become_user: oracle
  gather_facts: yes

  vars:
    source_home: "{{ oracle_home_19c }}"
    target_home: "{{ oracle_home_26c }}"
    target_ver: "26"
    db_name: "{{ oracle_db_name }}"
    db_sid: "{{ oracle_sid }}"
    java_bin: "{{ target_home }}/jdk/bin/java"
    jar_file: "{{ target_home }}/rdbms/admin/autoupgrade.jar"
    config_file: "{{ autoupgrade_config_dir }}/config.cfg"

  tasks:

    # ====================================================================
    # FASE 1: PRE-UPGRADE (eseguire 24h prima — NO downtime)
    # Equivale a CruGlobal pre_upgrade.yml
    # ====================================================================

    - name: "Setup — Crea directory AutoUpgrade"
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ autoupgrade_config_dir }}"
        - "{{ autoupgrade_log_dir }}"
        - "{{ autoupgrade_log_dir }}/{{ db_name }}"
      tags: [pre_upgrade, upgrade, finalize]

    - name: "Setup — Genera config.cfg (da template)"
      copy:
        dest: "{{ config_file }}"
        mode: '0644'
        content: |
          # Generated by Ansible — {{ ansible_date_time.iso8601 }}
          global.autoupg_log_dir={{ autoupgrade_log_dir }}

          upg1.dbname={{ db_name }}
          upg1.start_time=NOW
          upg1.source_home={{ source_home }}
          upg1.target_home={{ target_home }}
          upg1.sid={{ db_sid }}
          upg1.log_dir={{ autoupgrade_log_dir }}/{{ db_name }}
          upg1.upgrade_node={{ inventory_hostname }}
          upg1.target_version={{ target_ver }}
          upg1.restoration=yes
          upg1.drop_grp_after_upgrade=yes
          upg1.timezone_upg=yes
      tags: [pre_upgrade, upgrade]

    # ---- Pre-Upgrade: Backup Completo ----

    - name: "PRE-UPGRADE — Backup RMAN Level 0 (completo)"
      shell: |
        export ORACLE_HOME={{ source_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ source_home }}/bin:$PATH
        rman target / <<EOF
        BACKUP AS COMPRESSED BACKUPSET DATABASE PLUS ARCHIVELOG;
        BACKUP CURRENT CONTROLFILE;
        EXIT;
        EOF
      register: pre_backup
      tags: [pre_upgrade]

    - name: "PRE-UPGRADE — Verifica backup"
      assert:
        that: "'RMAN-00569' not in pre_backup.stdout"
        fail_msg: "Backup RMAN fallito! Non procedere."
        success_msg: "Backup Level 0 completato."
      tags: [pre_upgrade]

    # ---- Pre-Upgrade: Analyze ----

    - name: "PRE-UPGRADE — AutoUpgrade ANALYZE"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export PATH={{ target_home }}/bin:$PATH
        {{ java_bin }} -jar {{ jar_file }} \
          -config {{ config_file }} \
          -mode analyze \
          -noconsole
      register: analyze_result
      changed_when: false
      tags: [pre_upgrade]

    - name: "PRE-UPGRADE — Report Analyze"
      debug:
        msg: "{{ analyze_result.stdout_lines[-15:] }}"
      tags: [pre_upgrade]

    - name: "PRE-UPGRADE — Verifica nessun errore"
      assert:
        that: "'Jobs failed           [0]' in analyze_result.stdout"
        fail_msg: "ANALYZE ha trovato errori! Controlla {{ autoupgrade_log_dir }}/{{ db_name }}/"
        success_msg: "✅ PRE-UPGRADE completato. Pronto per la FASE 2 (upgrade) durante il downtime."
      tags: [pre_upgrade]

    # ---- Pre-Upgrade: Fixups automatici ----

    - name: "PRE-UPGRADE — AutoUpgrade FIXUPS"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export PATH={{ target_home }}/bin:$PATH
        {{ java_bin }} -jar {{ jar_file }} \
          -config {{ config_file }} \
          -mode fixups \
          -noconsole
      register: fixups_result
      changed_when: false
      tags: [pre_upgrade]

    # ====================================================================
    # FASE 2: UPGRADE (⚠️ DOWNTIME RICHIESTO!)
    # Equivale a CruGlobal upgrade.yml
    # ====================================================================

    - name: "⚠️ UPGRADE — Conferma prima di procedere"
      pause:
        prompt: |
          ================================================
          FASE 2: UPGRADE REALE — IL DATABASE SARÀ DOWN!
          
          Database: {{ db_name }}
          Source:   {{ source_home }}
          Target:   {{ target_home }}
          Host:     {{ inventory_hostname }}
          
          Hai verificato che il PRE-UPGRADE (Fase 1) sia passato?
          Hai comunicato il downtime al team applicativo?
          
          ENTER per continuare, Ctrl+C per annullare.
          ================================================
      tags: [upgrade]

    - name: "UPGRADE — Backup RMAN incrementale (Level 1)"
      shell: |
        export ORACLE_HOME={{ source_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ source_home }}/bin:$PATH
        rman target / <<EOF
        BACKUP AS COMPRESSED BACKUPSET INCREMENTAL LEVEL 1 DATABASE PLUS ARCHIVELOG;
        EXIT;
        EOF
      register: incr_backup
      tags: [upgrade]

    - name: "UPGRADE — AutoUpgrade DEPLOY"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export PATH={{ target_home }}/bin:$PATH
        {{ java_bin }} -jar {{ jar_file }} \
          -config {{ config_file }} \
          -mode deploy \
          -noconsole
      register: deploy_result
      tags: [upgrade]

    - name: "UPGRADE — Report Deploy"
      debug:
        msg: "{{ deploy_result.stdout_lines[-20:] }}"
      tags: [upgrade]

    # ---- Post-Upgrade immediato ----

    - name: "UPGRADE — Verifica versione post-upgrade"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        SELECT 'VERSION: ' || version_full FROM v\$instance;
        SELECT 'STATUS:  ' || status FROM v\$instance;
        EXIT;
        EOF
      register: post_version
      changed_when: false
      tags: [upgrade]

    - name: "UPGRADE — Ricompila invalidi"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        @{{ target_home }}/rdbms/admin/utlrp.sql
        EXIT;
        EOF
      tags: [upgrade]

    - name: "UPGRADE — Datapatch"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        {{ target_home }}/OPatch/datapatch -verbose
      register: datapatch
      ignore_errors: yes
      tags: [upgrade]

    - name: "UPGRADE — Backup completo post-upgrade (Level 0)"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        rman target / <<EOF
        BACKUP AS COMPRESSED BACKUPSET DATABASE PLUS ARCHIVELOG;
        EXIT;
        EOF
      tags: [upgrade]

    - name: "Report FASE 2"
      debug:
        msg: |
          ✅ UPGRADE completato!
          {{ post_version.stdout_lines | default(['N/A']) | join('\n') }}
          
          ⚠️ ATTENZIONE: Il Guaranteed Restore Point è ancora attivo.
          Esegui la FASE 3 (--tags finalize) dopo 7 giorni di validazione.
      tags: [upgrade]

    # ====================================================================
    # FASE 3: FINALIZE (eseguire 7 giorni DOPO — NO downtime)
    # Equivale a CruGlobal upgrade_final.yml
    # ====================================================================

    - name: "FINALIZE — Conferma"
      pause:
        prompt: |
          ================================================
          FASE 3: FINALIZZAZIONE
          
          Stai per:
          1. Eliminare il Guaranteed Restore Point (il rollback non sarà più possibile!)
          2. Alzare il parametro COMPATIBLE (irreversibile!)
          3. Fare un backup Level 0 fresco
          
          Sono passati almeno 7 giorni dall'upgrade?
          Il team applicativo ha validato?
          
          ENTER per continuare, Ctrl+C per annullare.
          ================================================
      tags: [finalize]

    - name: "FINALIZE — Elimina Guaranteed Restore Point"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        DECLARE
          CURSOR c_grp IS SELECT name FROM v\$restore_point WHERE guarantee_flashback_database = 'YES';
        BEGIN
          FOR r IN c_grp LOOP
            EXECUTE IMMEDIATE 'DROP RESTORE POINT ' || r.name;
            DBMS_OUTPUT.PUT_LINE('Dropped: ' || r.name);
          END LOOP;
        END;
        /
        EXIT;
        EOF
      register: drop_grp
      tags: [finalize]

    - name: "FINALIZE — Alza COMPATIBLE"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        ALTER SYSTEM SET compatible = '{{ target_ver }}.0.0' SCOPE=SPFILE;
        EXIT;
        EOF
      tags: [finalize]

    - name: "FINALIZE — Restart per applicare COMPATIBLE"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SHUTDOWN IMMEDIATE;
        STARTUP;
        SHOW PARAMETER compatible;
        EXIT;
        EOF
      register: restart
      tags: [finalize]

    - name: "FINALIZE — Backup Level 0 definitivo"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        rman target / <<EOF
        BACKUP AS COMPRESSED BACKUPSET DATABASE PLUS ARCHIVELOG;
        EXIT;
        EOF
      tags: [finalize]

    - name: "✅ FINALIZZAZIONE COMPLETA"
      debug:
        msg: |
          ================================================
          UPGRADE COMPLETAMENTE FINALIZZATO
          Database: {{ db_name }}
          Compatible: {{ target_ver }}.0.0
          GRP: Eliminato
          Backup: Fresco Level 0
          ================================================
      tags: [finalize]
