---
# ============================================================================
# Playbook: Oracle AutoUpgrade
# Descrizione: Automatizza l'upgrade di un Oracle Database tramite AutoUpgrade
# Autore: DBA Team
# Uso:
#   ANALYZE:  ansible-playbook -i inventory.ini playbooks/oracle_autoupgrade.yml --tags analyze
#   DEPLOY:   ansible-playbook -i inventory.ini playbooks/oracle_autoupgrade.yml --tags deploy
# ============================================================================

- name: Oracle Database AutoUpgrade
  hosts: oracle_servers
  become: yes
  become_user: oracle
  gather_facts: yes

  vars:
    # Sovrascrivibili da inventory.ini o da --extra-vars
    source_home: "{{ oracle_source_home }}"
    target_home: "{{ oracle_target_home }}"
    db_name: "{{ oracle_db_name }}"
    db_sid: "{{ oracle_sid }}"
    target_ver: "{{ target_version | default('26') }}"
    config_dir: /home/oracle/autoupgrade
    config_file: "{{ config_dir }}/config.cfg"
    log_dir: "{{ autoupgrade_log_dir }}"
    autoupgrade_jar: "{{ target_home }}/rdbms/admin/autoupgrade.jar"
    java_bin: "{{ target_home }}/jdk/bin/java"

  # ======================================================================
  # PRE-TASKS: Verifiche e Prerequisiti
  # ======================================================================
  pre_tasks:

    - name: "Verifica — Target ORACLE_HOME esiste"
      stat:
        path: "{{ target_home }}/bin/oracle"
      register: target_oracle_bin
      failed_when: not target_oracle_bin.stat.exists
      tags: [always]

    - name: "Verifica — autoupgrade.jar presente"
      stat:
        path: "{{ autoupgrade_jar }}"
      register: jar_check
      failed_when: not jar_check.stat.exists
      tags: [always]

    - name: "Verifica — Java disponibile nel target ORACLE_HOME"
      command: "{{ java_bin }} -version"
      register: java_version
      changed_when: false
      tags: [always]

    - name: "Mostra versione Java"
      debug:
        msg: "{{ java_version.stderr_lines | default(java_version.stdout_lines) }}"
      tags: [always]

    - name: "Verifica — Database source in esecuzione"
      shell: |
        export ORACLE_HOME={{ source_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ source_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        SELECT status FROM v\$instance;
        EXIT;
        EOF
      register: db_status
      changed_when: false
      failed_when: "'OPEN' not in db_status.stdout"
      tags: [always]

    - name: "Info — Versione source database"
      shell: |
        export ORACLE_HOME={{ source_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ source_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        SELECT version_full FROM v\$instance;
        EXIT;
        EOF
      register: source_version
      changed_when: false
      tags: [always]

    - name: "Mostra versione source"
      debug:
        msg: "Database {{ db_name }} è in versione {{ source_version.stdout | trim }}"
      tags: [always]

  tasks:

    # ====================================================================
    # STEP 1: Genera il file di configurazione
    # ====================================================================

    - name: "Crea directory AutoUpgrade"
      file:
        path: "{{ item }}"
        state: directory
        owner: oracle
        group: oinstall
        mode: '0755'
      loop:
        - "{{ config_dir }}"
        - "{{ log_dir }}"
        - "{{ log_dir }}/{{ db_name }}"
      tags: [analyze, deploy]

    - name: "Genera config.cfg"
      copy:
        dest: "{{ config_file }}"
        owner: oracle
        group: oinstall
        mode: '0644'
        content: |
          # Auto-generated by Ansible — {{ ansible_date_time.iso8601 }}
          global.autoupg_log_dir={{ log_dir }}

          upg1.dbname={{ db_name }}
          upg1.start_time=NOW
          upg1.source_home={{ source_home }}
          upg1.target_home={{ target_home }}
          upg1.sid={{ db_sid }}
          upg1.log_dir={{ log_dir }}/{{ db_name }}
          upg1.upgrade_node={{ inventory_hostname }}
          upg1.target_version={{ target_ver }}
          upg1.restoration=yes
          upg1.drop_grp_after_upgrade=yes
          upg1.timezone_upg=yes
      tags: [analyze, deploy]

    # ====================================================================
    # STEP 2: Backup RMAN (solo prima del deploy)
    # ====================================================================

    - name: "Backup RMAN pre-upgrade"
      shell: |
        export ORACLE_HOME={{ source_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ source_home }}/bin:$PATH
        rman target / <<EOF
        BACKUP AS COMPRESSED BACKUPSET DATABASE PLUS ARCHIVELOG;
        BACKUP CURRENT CONTROLFILE;
        EXIT;
        EOF
      register: rman_backup
      changed_when: "'completed' in rman_backup.stdout | lower"
      tags: [deploy]

    - name: "Verifica esito backup RMAN"
      assert:
        that:
          - "'RMAN-00569' not in rman_backup.stdout"
          - "'ORA-' not in rman_backup.stdout"
        fail_msg: "Backup RMAN fallito! NON procedere con l'upgrade."
        success_msg: "Backup RMAN completato con successo."
      tags: [deploy]

    # ====================================================================
    # STEP 3: ANALYZE (dry run — nessuna modifica)
    # ====================================================================

    - name: "AutoUpgrade — ANALYZE"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export PATH={{ target_home }}/bin:$PATH
        {{ java_bin }} -jar {{ autoupgrade_jar }} \
          -config {{ config_file }} \
          -mode analyze \
          -noconsole
      register: analyze_result
      changed_when: false
      tags: [analyze]

    - name: "Mostra risultato ANALYZE"
      debug:
        msg: "{{ analyze_result.stdout_lines[-15:] }}"
      tags: [analyze]

    - name: "Verifica ANALYZE senza errori"
      assert:
        that:
          - "'Jobs failed           [0]' in analyze_result.stdout"
        fail_msg: "ANALYZE ha trovato errori! Controlla i log in {{ log_dir }}/{{ db_name }}/"
        success_msg: "ANALYZE completato senza errori. Pronto per il deploy."
      tags: [analyze]

    # ====================================================================
    # STEP 4: DEPLOY (upgrade reale — ⚠️ il DB sarà DOWN)
    # ====================================================================

    - name: "⚠️ CONFERMA — Stai per eseguire l'upgrade reale"
      pause:
        prompt: |
          ====================================================
          ATTENZIONE: Stai per eseguire l'upgrade REALE di {{ db_name }}!
          Il database sarà DOWN durante il processo.
          
          Source: {{ source_home }}
          Target: {{ target_home }}
          Host:   {{ inventory_hostname }}
          
          Premi ENTER per continuare o Ctrl+C per annullare.
          ====================================================
      tags: [deploy]

    - name: "AutoUpgrade — DEPLOY"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export PATH={{ target_home }}/bin:$PATH
        {{ java_bin }} -jar {{ autoupgrade_jar }} \
          -config {{ config_file }} \
          -mode deploy \
          -noconsole
      register: deploy_result
      tags: [deploy]

    - name: "Mostra risultato DEPLOY"
      debug:
        msg: "{{ deploy_result.stdout_lines[-20:] }}"
      tags: [deploy]

    # ====================================================================
    # STEP 5: Post-Upgrade Checks
    # ====================================================================

    - name: "Post-Upgrade — Verifica versione"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        SELECT 'VERSION: ' || version_full FROM v\$instance;
        SELECT 'STATUS: ' || status FROM v\$instance;
        SELECT 'COMPATIBLE: ' || value FROM v\$parameter WHERE name='compatible';
        EXIT;
        EOF
      register: post_check
      changed_when: false
      tags: [deploy]

    - name: "Mostra stato post-upgrade"
      debug:
        msg: "{{ post_check.stdout_lines }}"
      tags: [deploy]

    - name: "Post-Upgrade — Ricompila oggetti invalidi"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        @{{ target_home }}/rdbms/admin/utlrp.sql
        EXIT;
        EOF
      register: recompile
      changed_when: false
      tags: [deploy]

    - name: "Post-Upgrade — Conta oggetti invalidi rimasti"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        sqlplus -s / as sysdba <<EOF
        SET HEAD OFF FEED OFF
        SELECT COUNT(*) FROM dba_objects WHERE status = 'INVALID';
        EXIT;
        EOF
      register: invalid_count
      changed_when: false
      tags: [deploy]

    - name: "Mostra oggetti invalidi"
      debug:
        msg: "Oggetti invalidi rimasti: {{ invalid_count.stdout | trim }}"
      tags: [deploy]

    - name: "Post-Upgrade — Esegui datapatch"
      shell: |
        export ORACLE_HOME={{ target_home }}
        export ORACLE_SID={{ db_sid }}
        export PATH={{ target_home }}/bin:$PATH
        {{ target_home }}/OPatch/datapatch -verbose
      register: datapatch
      changed_when: "'Datapatch execution has completed' in datapatch.stdout"
      ignore_errors: yes
      tags: [deploy]

  # ======================================================================
  # POST-TASKS
  # ======================================================================
  post_tasks:

    - name: "Riepilogo Finale"
      debug:
        msg: |
          ============================================
          UPGRADE COMPLETATO per {{ db_name }}
          Host: {{ inventory_hostname }}
          Source: {{ source_home }}
          Target: {{ target_home }}
          Log: {{ log_dir }}/{{ db_name }}/
          ============================================
      tags: [deploy]
