---
- name: Logical Backup - DataPump Export Automation
  hosts: oracle_primary[0]
  become: true
  become_user: oracle
  gather_facts: false
  vars:
    export_schema: "APP_USER"
    dump_dir: "DATA_PUMP_DIR"
    datapump_parallel: 2

  pre_tasks:
    - name: Generate timestamp
      ansible.builtin.command: date +%Y%m%d_%H%M
      register: current_time
      changed_when: false

    - name: Pre-check - verify Data Pump directory object
      ansible.builtin.shell: |
        export ORACLE_SID={{ oracle_sid }}
        export ORACLE_HOME={{ oracle_home }}
        export PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba <<'SQL'
        SET HEAD OFF FEED OFF
        SELECT COUNT(*) FROM dba_directories WHERE directory_name = UPPER('{{ dump_dir }}');
        EXIT;
        SQL
      register: dp_dir_exists
      changed_when: false

    - name: Assert Data Pump directory exists
      ansible.builtin.assert:
        that:
          - dp_dir_exists.stdout | trim | int == 1
        fail_msg: "Directory object {{ dump_dir }} non esiste nel database."

  tasks:
    - name: Run expdp
      ansible.builtin.shell: |
        export ORACLE_SID={{ oracle_sid }}
        export ORACLE_HOME={{ oracle_home }}
        export PATH={{ oracle_home }}/bin:$PATH
        expdp userid="\"/ as sysdba\"" \
          schemas={{ export_schema }} \
          directory={{ dump_dir }} \
          dumpfile={{ export_schema }}_{{ current_time.stdout }}.dmp \
          logfile={{ export_schema }}_{{ current_time.stdout }}.log \
          compression=all \
          parallel={{ datapump_parallel }}
      register: expdp_out
      changed_when: "'successfully completed' in expdp_out.stdout | lower"
      failed_when:
        - expdp_out.rc != 0
        - "'ORA-' in expdp_out.stdout"
        - "'UDE-' in expdp_out.stdout"

    - name: Display export tail
      ansible.builtin.debug:
        msg: "{{ expdp_out.stdout_lines[-15:] }}"
