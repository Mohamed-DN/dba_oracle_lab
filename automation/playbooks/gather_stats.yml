---
- name: Gather Optimizer Statistics Automation
  hosts: oracle_primary[0]
  become: true
  become_user: oracle
  gather_facts: false
  vars:
    schema_name: "APP_USER"

  pre_tasks:
    - name: Pre-check - schema exists
      ansible.builtin.shell: |
        export ORACLE_SID={{ oracle_sid }}
        export ORACLE_HOME={{ oracle_home }}
        export PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba <<'SQL'
        SET HEAD OFF FEED OFF
        SELECT COUNT(*) FROM dba_users WHERE username = UPPER('{{ schema_name }}');
        EXIT;
        SQL
      register: schema_exists
      changed_when: false

    - name: Assert schema exists
      ansible.builtin.assert:
        that:
          - schema_exists.stdout | trim | int == 1
        fail_msg: "Schema {{ schema_name }} non trovato."

  tasks:
    - name: Run DBMS_STATS gather schema stats
      ansible.builtin.shell: |
        export ORACLE_SID={{ oracle_sid }}
        export ORACLE_HOME={{ oracle_home }}
        export PATH={{ oracle_home }}/bin:$PATH
        sqlplus -s / as sysdba <<'SQL'
        WHENEVER SQLERROR EXIT SQL.SQLCODE;
        SET SERVEROUTPUT ON FEEDBACK OFF
        BEGIN
          DBMS_STATS.GATHER_SCHEMA_STATS(
            ownname          => UPPER('{{ schema_name }}'),
            estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE,
            method_opt       => 'FOR ALL COLUMNS SIZE AUTO',
            degree           => 4,
            cascade          => TRUE,
            options          => 'GATHER AUTO'
          );
          DBMS_OUTPUT.PUT_LINE('STATS_COMPLETED');
        END;
        /
        EXIT;
        SQL
      register: stats_output
      changed_when: "'STATS_COMPLETED' in stats_output.stdout"
      failed_when:
        - stats_output.rc != 0
        - "'ORA-' in stats_output.stdout"

    - name: Output result
      ansible.builtin.debug:
        msg: "Statistics gathered for {{ schema_name }}: {{ stats_output.stdout_lines }}"
