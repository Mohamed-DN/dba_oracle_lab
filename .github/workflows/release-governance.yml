name: Release Governance

on:
  pull_request:
    branches: ["main", "master"]
    paths:
      - "VERSION"
      - "CHANGELOG.md"
      - "docs/14_enterprise_governance/**"
      - ".github/workflows/release-governance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-checks:
    name: Validate semantic versioning and release assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate VERSION is SemVer
        run: |
          version=$(cat VERSION)
          echo "VERSION=${version}"
          echo "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'

      - name: Validate changelog structure
        run: |
          grep -q "# Changelog" CHANGELOG.md
          grep -q "## \[Unreleased\]" CHANGELOG.md

      - name: Validate compatibility policy exists
        run: |
          test -f docs/14_enterprise_governance/COMPATIBILITY_POLICY.md
          grep -q "supported" docs/14_enterprise_governance/COMPATIBILITY_POLICY.md
          test -f docs/14_enterprise_governance/GO_NO_GO_MASTER_MERGE_POLICY.md
          grep -qi "go/no-go" docs/14_enterprise_governance/GO_NO_GO_MASTER_MERGE_POLICY.md
