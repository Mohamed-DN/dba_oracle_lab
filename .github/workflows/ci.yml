name: CI/CD & Code Quality

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  lint-ansible:
    name: Lint Ansible Playbooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Ansible Lint
        run: |
          pip install ansible-lint ansible

      - name: Run Ansible Lint
        run: ansible-lint -q automation/playbooks/*.yml

  lint-shell:
    name: Lint Bash Scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './scripts'
        env:
          # Ignoriamo warning didattici come la mancata virgolettatura di alcune var (SC2086)
          SHELLCHECK_OPTS: "-e SC2086 -e SC2154"

  check-markdown:
    name: Check Markdown Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Markdown Lint
        uses: avto-dev/markdown-lint@v1
        with:
          config: '.markdownlint.json'
          args: 'README.md CONTRIBUTING.md docs/**/*.md automation/**/*.md vagrant_rac_dataguard/**/*.md'

  check-didactic-compliance:
    name: Check Didactic Compliance (Changed Guides)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed guides
        id: changed-guides
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          HEAD="${{ github.sha }}"

          FILES="$(git diff --name-only "$BASE" "$HEAD" -- \
            ':(glob)docs/**/GUIDA*.md' \
            ':(glob)docs/**/RUNBOOK*.md' | sort -u)"

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate didactic compliance
        run: |
          FILES='${{ steps.changed-guides.outputs.files }}'
          if [ -z "$FILES" ]; then
            echo "Nessuna guida modificata: controllo skipped."
            exit 0
          fi
          mapfile -t FILE_LIST < <(printf '%s\n' "$FILES" | sed '/^$/d')
          python3 scripts/validate_didactic_compliance.py "${FILE_LIST[@]}"

  check-markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Link check
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --exclude-mail
            --accept 200,429
            README.md
            CONTRIBUTING.md
            automation/README.md
            docs/00_fondamenti/TEMPLATE_GUIDA_STANDARD.md
            docs/00_fondamenti/LEARNING_PATH_JUNIOR_MID_SENIOR.md
            docs/04_administration/CHECKLIST_SECURITY_BASELINE.md
            docs/11_runbook_operativi/*.md
            docs/12_scripts_sql_pronti/README.md
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

  check-proxmox-track-baseline:
    name: Check Proxmox Track Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate mandatory Proxmox track files
        run: |
          test -f docs/15_proxmox_track/README.md
          test -f docs/15_proxmox_track/PHASE_1_PROXMOX_FOUNDATION.md
          test -f docs/15_proxmox_track/PHASE_3_ANSIBLE_AWX.md
          test -f docs/15_proxmox_track/PHASE_4_ORACLE_SILENT_AUTOMATION.md
          test -f docs/15_proxmox_track/PHASE_5_K8S_CAPSTONE.md
          test -f infrastructure/proxmox/terraform/main.tf
          test -f infrastructure/proxmox/terraform/variables.tf
          test -f infrastructure/proxmox/terraform/outputs.tf

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Check Terraform formatting
        run: terraform -chdir=infrastructure/proxmox/terraform fmt -check -recursive
